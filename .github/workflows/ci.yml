name: Gateway CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-contract-e2e:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: kotonoha
          POSTGRES_PASSWORD: kotonoha
          POSTGRES_DB: kotonoha_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U kotonoha -d kotonoha_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://kotonoha:kotonoha@localhost:5432/kotonoha_test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/checkout@v4
        with:
          repository: zyx-corporation/kotonoha-cli
          path: kotonoha-cli

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - name: Build kotonoha CLI
        working-directory: kotonoha-cli
        run: cargo build --release

      - name: npm ci, build, contract, smoke, E2E
        env:
          KOTONOHA_BIN: ${{ github.workspace }}/kotonoha-cli/target/release/kotonoha
          KOTONOHA_WORKDIR: ${{ github.workspace }}/kotonoha-cli
        run: |
          npm ci
          npm run build
          npm run contract:cli-only
          npm run test:cli
          npm run test:e2e
